kind: ConfigMap
apiVersion: v1
metadata:
  name: openclaw-config
  namespace: app-openclaw
data:
  openclaw.json: |
    {
      "meta": {
        "lastTouchedVersion": "2026.3.28",
        "lastTouchedAt": "2026-03-30T16:25:24.262Z"
      },
      "wizard": {
        "lastRunAt": "2026-03-30T16:25:24.233Z",
        "lastRunVersion": "2026.3.28",
        "lastRunCommand": "onboard",
        "lastRunMode": "local"
      },
      "auth": {
        "profiles": {
          "openai:default": {
            "provider": "openai",
            "mode": "api_key"
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "openai/gpt-5.4-mini"
          },
          "models": {
            "openai/gpt-5.4": {
              "alias": "GPT"
            },
            "openai/gpt-5.4-mini": {}
          },
          "workspace": "/home/node/.openclaw/workspace"
        }
      },
      "tools": {
        "profile": "coding",
        "web": {
          "search": {
            "enabled": true,
            "provider": "duckduckgo"
          }
        }
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto",
        "restart": true,
        "ownerDisplay": "raw"
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "channels": {
        "discord": {
          "enabled": true,
          "token": {
            "source": "env",
            "provider": "default",
            "id": "DISCORD_BOT_TOKEN"
          },
          "groupPolicy": "allowlist",
          "streaming": "off",
          "guilds": {
            "*": {}
          }
        }
      },
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:18789",
            "http://127.0.0.1:18789"
          ]
        },
        "auth": {
          "mode": "token",
          "token": {
            "source": "env",
            "provider": "default",
            "id": "OPENCLAW_GATEWAY_TOKEN"
          }
        },
        "tailscale": {
          "mode": "off",
          "resetOnExit": false
        },
        "nodes": {
          "denyCommands": [
            "camera.snap",
            "camera.clip",
            "screen.record",
            "contacts.add",
            "calendar.add",
            "reminders.add",
            "sms.send"
          ]
        }
      },
      "plugins": {
        "entries": {
          "duckduckgo": {
            "enabled": true,
            "config": {}
          }
        }
      }
    }
